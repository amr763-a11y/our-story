<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ليكي انتي</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Aref+Ruqaa:wght@400;700&family=Tajawal:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --ink-night: #241934;
    --ink-night-2: #2f2044;
    --plum: #6b4c6e;
    --rose: #e85d75;
    --rose-deep: #c93f57;
    --gold: #e8b84b;
    --cream: #f7ecdd;
    --cream-dim: #d9c9b8;
  }

  *{ box-sizing: border-box; }
  html, body{ margin:0; padding:0; }

  body{
    min-height: 100vh;
    background:
      radial-gradient(ellipse at 15% 10%, rgba(232,93,117,0.16), transparent 55%),
      radial-gradient(ellipse at 85% 90%, rgba(232,184,75,0.10), transparent 55%),
      linear-gradient(180deg, var(--ink-night) 0%, var(--ink-night-2) 55%, #1a1226 100%);
    font-family: 'Tajawal', sans-serif;
    color: var(--cream);
    position: relative;
    overflow-x: hidden;
  }

  .stars{ position: fixed; inset: 0; pointer-events: none; z-index: 0; }
  .star{
    position: absolute; width: 2px; height: 2px; background: var(--cream);
    border-radius: 50%; opacity: 0.5; animation: twinkle 3.5s ease-in-out infinite;
  }
  @keyframes twinkle{ 0%,100%{opacity:.15;} 50%{opacity:.85;} }

  .heart{
    position: fixed; bottom: -40px; font-size: 18px; color: var(--rose);
    opacity: 0.5; pointer-events: none; z-index: 0; animation: rise linear infinite;
    filter: drop-shadow(0 0 6px rgba(232,93,117,0.35));
  }
  @keyframes rise{
    0%{ transform: translateY(0) translateX(0) rotate(0deg); opacity:0; }
    10%{ opacity:.55; }
    100%{ transform: translateY(-110vh) translateX(var(--drift,20px)) rotate(25deg); opacity:0; }
  }

  header{
    position: relative;
    z-index: 1;
    text-align: center;
    padding: 56px 20px 20px;
  }

  .eyebrow{
    font-size: 13px; letter-spacing: 2px; color: var(--gold);
    text-transform: uppercase; margin-bottom: 14px; opacity: .9;
  }

  h1{
    font-family: 'Aref Ruqaa', serif;
    font-weight: 700;
    font-size: clamp(28px, 6vw, 42px);
    line-height: 1.5;
    margin: 0 0 10px;
    text-shadow: 0 2px 20px rgba(232,93,117,0.25);
  }

  .sub{
    max-width: 520px;
    margin: 0 auto;
    font-size: 15.5px;
    line-height: 1.9;
    color: var(--cream-dim);
    font-weight: 300;
  }

  /* sound bar */
  .soundbar{
    position: fixed;
    top: 18px;
    left: 18px;
    z-index: 5;
    display: flex;
    align-items: center;
    gap: 10px;
    background: rgba(36,25,52,0.7);
    border: 1px solid rgba(232,184,75,0.3);
    padding: 10px 16px;
    border-radius: 999px;
    backdrop-filter: blur(8px);
    cursor: pointer;
    font-size: 13px;
    color: var(--cream-dim);
    transition: transform .15s ease;
  }
  .soundbar:hover{ transform: translateY(-1px); }
  .bars{ display:flex; align-items:flex-end; gap:2px; height:14px; }
  .bars span{
    width: 3px; background: var(--rose); border-radius: 2px;
    animation: bounce 1s ease-in-out infinite;
  }
  .bars span:nth-child(1){ height: 40%; animation-delay: 0s; }
  .bars span:nth-child(2){ height: 100%; animation-delay: .15s; }
  .bars span:nth-child(3){ height: 60%; animation-delay: .3s; }
  .bars span:nth-child(4){ height: 85%; animation-delay: .45s; }
  .soundbar.paused .bars span{ animation-play-state: paused; height: 30%; }
  @keyframes bounce{ 0%,100%{ transform: scaleY(.4);} 50%{ transform: scaleY(1);} }

  /* gallery */
  .gallery{
    position: relative;
    z-index: 1;
    display: flex;
    gap: 26px;
    overflow-x: auto;
    scroll-snap-type: x mandatory;
    padding: 40px 8vw 30px;
    -webkit-overflow-scrolling: touch;
  }
  .gallery::-webkit-scrollbar{ height: 6px; }
  .gallery::-webkit-scrollbar-thumb{ background: rgba(232,184,75,0.4); border-radius: 10px; }

  .polaroid{
    flex: 0 0 auto;
    scroll-snap-align: center;
    width: min(72vw, 300px);
    background: var(--cream);
    padding: 14px 14px 46px;
    border-radius: 6px;
    box-shadow: 0 20px 45px -15px rgba(0,0,0,0.55);
    transform: rotate(var(--tilt, 0deg));
    transition: transform .25s ease;
  }
  .polaroid:hover{ transform: rotate(0deg) scale(1.03); }
  .polaroid img{
    width: 100%;
    aspect-ratio: 4/5;
    object-fit: cover;
    display: block;
    border-radius: 2px;
    background: #ccc;
  }
  .polaroid .cap{
    display: block;
    text-align: center;
    margin-top: 12px;
    font-family: 'Aref Ruqaa', serif;
    font-size: 16px;
    color: #3a2a2a;
  }

  .vidcard{
    flex: 0 0 auto;
    scroll-snap-align: center;
    width: min(72vw, 260px);
    background: #000;
    border-radius: 14px;
    overflow: hidden;
    box-shadow: 0 20px 45px -15px rgba(0,0,0,0.6);
    border: 1px solid rgba(232,184,75,0.2);
    position: relative;
  }
  .vidcard video{
    width: 100%;
    aspect-ratio: 9/16;
    object-fit: cover;
    display: block;
    background: #000;
  }
  .vidcard .tag{
    position: absolute;
    bottom: 10px;
    right: 12px;
    font-size: 12px;
    color: var(--cream-dim);
    background: rgba(0,0,0,0.45);
    padding: 4px 10px;
    border-radius: 999px;
    backdrop-filter: blur(4px);
  }

  .hint{
    text-align: center;
    font-size: 13px;
    color: var(--cream-dim);
    opacity: .6;
    margin: -10px 0 10px;
  }

  .closing{
    position: relative;
    z-index: 1;
    max-width: 560px;
    margin: 30px auto 70px;
    padding: 0 24px;
    text-align: center;
  }

  .closing .frame{
    background: linear-gradient(180deg, rgba(255,255,255,0.06), rgba(255,255,255,0.02));
    border: 1px solid rgba(232,184,75,0.25);
    border-radius: 18px;
    padding: 30px 24px;
    backdrop-filter: blur(6px);
  }

  .closing img{
    width: 100%;
    max-width: 320px;
    border-radius: 14px;
    margin-bottom: 20px;
    box-shadow: 0 20px 40px -15px rgba(0,0,0,0.5);
  }

  .closing p{
    font-family: 'Aref Ruqaa', serif;
    font-size: clamp(19px, 4vw, 24px);
    line-height: 1.9;
    color: var(--cream);
    margin: 0;
  }

  .signature{
    margin-top: 18px;
    font-size: 14px;
    color: var(--gold);
    letter-spacing: 1px;
  }

  @media (prefers-reduced-motion: reduce){
    .heart, .star, .bars span{ animation: none; }
  }
</style>
</head>
<body>

<div class="stars" id="stars"></div>

<div class="soundbar" id="soundbar">
  <div class="bars"><span></span><span></span><span></span><span></span></div>
  <span id="soundLabel">بتشتغل دلوقتي</span>
</div>
<audio id="song" src="assets/song.mp3" loop></audio>

<header>
  <div class="eyebrow">مصالحة رسمية</div>
  <h1>كل صورة هنا... فيها ابتسامة نفسي أرجعها تاني</h1>
  <p class="sub">وأنا بتفرج عليهم كل يوم وقلبي بيتذكر ليه بحبك أوي.</p>
</header>

<p class="hint">اسحبي يمين وشمال 👉</p>

<div class="gallery" id="gallery">
  <!-- polaroids injected by JS -->
</div>

<p class="hint" style="margin-top:6px;">وشوية لحظات بتتحرك 🎬</p>

<div class="gallery" id="videoGallery">
  <!-- video cards injected by JS -->
</div>

<div class="closing">
  <div class="frame">
    <img src="assets/photo14.jpg" alt="إيدينا مع بعض">
    <p>مهما زعلنا وخانقنا بعض... إيدينا برضو بتلاقي طريقها لبعض 🤍</p>
    <div class="signature">وحشتيني أوي</div>
  </div>
</div>

<script>
  // stars
  const starsWrap = document.getElementById('stars');
  for(let i=0;i<50;i++){
    const s = document.createElement('div');
    s.className = 'star';
    s.style.left = Math.random()*100 + 'vw';
    s.style.top = Math.random()*100 + 'vh';
    s.style.animationDelay = (Math.random()*3.5) + 's';
    starsWrap.appendChild(s);
  }

  // floating hearts
  function spawnHeart(){
    const h = document.createElement('div');
    h.className = 'heart';
    h.textContent = ['💗','💛','🌷','✨'][Math.floor(Math.random()*4)];
    h.style.left = Math.random()*100 + 'vw';
    h.style.setProperty('--drift', (Math.random()*60-30) + 'px');
    h.style.animationDuration = (6 + Math.random()*5) + 's';
    document.body.appendChild(h);
    setTimeout(()=>h.remove(), 12000);
  }
  setInterval(spawnHeart, 1000);

  // gallery data: photo + a caption line
  const photos = [
    { src: 'assets/photo01.jpg', cap: 'أحلى ابتسامة شفتها' },
    { src: 'assets/photo02.jpg', cap: 'يوم كنتي مبسوطة كده' },
    { src: 'assets/photo03.jpg', cap: 'حتى وانتي مستخبية، حلوة' },
    { src: 'assets/photo04.jpg', cap: 'عيونك دي بتقول كل حاجة' },
    { src: 'assets/photo05.jpg', cap: 'شقاوتك اللي بحبها' },
    { src: 'assets/photo06.jpg', cap: 'وانتي بتتعبي نفسك برضو حلوة' },
    { src: 'assets/photo07.jpg', cap: 'دلوعة زيك محدش' },
    { src: 'assets/photo08.jpg', cap: 'كل ستايل بتعمليه عاجبني' },
    { src: 'assets/photo09.jpg', cap: 'ضحكتك دي أد الدنيا كلها' },
    { src: 'assets/photo10.jpg', cap: 'أميرة من غير تاج' },
    { src: 'assets/photo11.jpg', cap: 'وحتى وانتي زعلانة، حلوة' },
    { src: 'assets/photo12.jpg', cap: 'يوم من أحلى الأيام' },
    { src: 'assets/photo13.jpg', cap: 'دي ابتسامة تسرق القلب' },
  ];

  const gallery = document.getElementById('gallery');
  photos.forEach((p, i) => {
    const card = document.createElement('div');
    card.className = 'polaroid';
    const tilt = (i % 2 === 0 ? -1 : 1) * (3 + Math.random()*4);
    card.style.setProperty('--tilt', tilt.toFixed(1) + 'deg');
    card.innerHTML = `<img src="${p.src}" alt="ذكرى حلوة" loading="lazy"><span class="cap">${p.cap}</span>`;
    gallery.appendChild(card);
  });

  // video cards
  const videos = [
    'assets/vid01.mp4',
    'assets/vid02.mp4',
    'assets/vid03.mp4',
    'assets/vid04.mp4',
    'assets/vid05.mp4',
    'assets/vid06.mp4',
    'assets/vid07.mp4',
  ];
  const videoGallery = document.getElementById('videoGallery');
  videos.forEach((src) => {
    const card = document.createElement('div');
    card.className = 'vidcard';
    card.innerHTML = `<video src="${src}" muted loop playsinline preload="metadata"></video><span class="tag">بدون صوت</span>`;
    videoGallery.appendChild(card);
  });

  // play a video only while it's visible on screen (saves resources, feels intentional)
  const vidEls = videoGallery.querySelectorAll('video');
  const vidObserver = new IntersectionObserver((entries) => {
    entries.forEach((entry) => {
      const v = entry.target;
      if (entry.isIntersecting) {
        v.play().catch(()=>{});
      } else {
        v.pause();
      }
    });
  }, { threshold: 0.6 });
  vidEls.forEach(v => vidObserver.observe(v));

  // audio autoplay handling
  const song = document.getElementById('song');
  const soundbar = document.getElementById('soundbar');
  const soundLabel = document.getElementById('soundLabel');

  function tryPlay(){
    song.play().then(() => {
      soundbar.classList.remove('paused');
      soundLabel.textContent = 'بتشتغل دلوقتي';
    }).catch(() => {
      soundbar.classList.add('paused');
      soundLabel.textContent = 'دوسي عشان الأغنية تشتغل';
    });
  }
  tryPlay();

  soundbar.addEventListener('click', () => {
    if(song.paused){
      tryPlay();
    } else {
      song.pause();
      soundbar.classList.add('paused');
      soundLabel.textContent = 'الأغنية متوقفة';
    }
  });

  // in case autoplay is blocked, first user tap anywhere starts it
  document.body.addEventListener('click', function once(){
    if(song.paused) tryPlay();
    document.body.removeEventListener('click', once);
  }, { once: true });
</script>
</body>
</html>
